services:
  prumo-api:
    image: ${PRUMO_API_IMAGE:-ryang20/prumo-api:1.0.55}
    container_name: prumo-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env
    volumes:
      - /opt/prumo/data:/app/output
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks: [prumo-net]

networks:
  prumo-net:
    name: prumo-net
