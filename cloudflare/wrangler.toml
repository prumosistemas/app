name = "morning-credit-8a59"
main = "worker.js"
compatibility_date = "2026-07-13"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

routes = [
  { pattern = "app.prumosistemas.com.br/", zone_name = "prumosistemas.com.br" },
  { pattern = "app.prumosistemas.com.br/login*", zone_name = "prumosistemas.com.br" },
  { pattern = "app.prumosistemas.com.br/admin*", zone_name = "prumosistemas.com.br" },
  { pattern = "app.prumosistemas.com.br/master*", zone_name = "prumosistemas.com.br" },
  { pattern = "app.prumosistemas.com.br/portal-nacional*", zone_name = "prumosistemas.com.br" },
  { pattern = "app.prumosistemas.com.br/iss-fortaleza*", zone_name = "prumosistemas.com.br" },
  { pattern = "app.prumosistemas.com.br/api/*", zone_name = "prumosistemas.com.br" },
  { pattern = "app.prumosistemas.com.br/py/*", zone_name = "prumosistemas.com.br" },
  { pattern = "app.prumosistemas.com.br/server/*", zone_name = "prumosistemas.com.br" },
  { pattern = "app.prumosistemas.com.br/deploy/*", zone_name = "prumosistemas.com.br" },
  { pattern = "app.prumosistemas.com.br/cloudflare/*", zone_name = "prumosistemas.com.br" },
  { pattern = "app.prumosistemas.com.br/docs/*", zone_name = "prumosistemas.com.br" },
  { pattern = "app.prumosistemas.com.br/legado/*", zone_name = "prumosistemas.com.br" },
  { pattern = "app.prumosistemas.com.br/tests/*", zone_name = "prumosistemas.com.br" },
  { pattern = "app.prumosistemas.com.br/tools/*", zone_name = "prumosistemas.com.br" },
  { pattern = "app.prumosistemas.com.br/solver/*", zone_name = "prumosistemas.com.br" },
  { pattern = "app.prumosistemas.com.br/AGENTS.md", zone_name = "prumosistemas.com.br" },
]

[[d1_databases]]
binding = "db"
database_name = "db"
database_id = "e69428e3-6524-427c-bae3-d32190e5c229"

[vars]
COMPANY_NAME = "Prumo Sistemas"
COOKIE_MODE = "prod"
FRONTEND_ORIGINS = "https://app.prumosistemas.com.br"
PYTHON_API_URL = "https://api.prumosistemas.com.br"

[triggers]
crons = ["* * * * *"]

[observability]
enabled = true
head_sampling_rate = 0.25
