<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Página não encontrada | Prumo Sistemas</title>
  <style>
    :root {
      --bg:#f0f2f7;
      --surface:#fff;
      --text:#111827;
      --muted:#5f6679;
      --border:#e4e6ef;
      --accent:#4f46e5;
      --accent-hover:#4338ca;
      --font:'Plus Jakarta Sans',Arial,sans-serif;
    }
    * { box-sizing:border-box; }
    body {
      margin:0;
      min-height:100vh;
      padding:24px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:var(--bg);
      color:var(--text);
      font:14px/1.5 var(--font);
    }
    main {
      width:min(440px,100%);
      text-align:center;
    }
    .logo {
      width:min(220px,70%);
      height:auto;
      margin-bottom:22px;
    }
    .card {
      padding:30px 26px;
      border:1px solid var(--border);
      border-radius:8px;
      background:var(--surface);
      box-shadow:0 10px 28px rgba(17,24,39,.05);
    }
    .code {
      margin-bottom:10px;
      color:var(--accent);
      font-size:12px;
      font-weight:700;
      text-transform:uppercase;
    }
    h1 {
      margin:0 0 10px;
      font-size:26px;
      line-height:1.25;
    }
    p {
      margin:0 0 24px;
      color:var(--muted);
    }
    .actions {
      display:grid;
      gap:10px;
    }
    a {
      min-height:42px;
      border-radius:8px;
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--text);
      font-weight:700;
      text-decoration:none;
    }
    .primary {
      background:var(--accent);
      color:#fff;
    }
    .primary:hover { background:var(--accent-hover); }
    .secondary {
      border:1px solid var(--border);
      background:#fff;
    }
    .secondary:hover { background:#f8f9fd; }
  </style>
</head>
<body>
  <main>
    <img class="logo" src="prumo-logo.png" alt="Prumo Sistemas">
    <section class="card" aria-labelledby="error-title">
      <div class="code">Erro 404</div>
      <h1 id="error-title">Página não encontrada</h1>
      <p>O endereço acessado não existe ou não está mais disponível.</p>
      <div class="actions">
        <a class="primary" href="index.html">Ir para a central</a>
        <a class="secondary" href="https://prumosistemas.com.br/">Voltar para o site</a>
      </div>
    </section>
  </main>
</body>
</html>
